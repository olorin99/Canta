on: [push]
jobs:
  build-canta:
    runs-on: debian-latest
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential python3 cmake ninja-build nodejs git libsdl2-dev libspdlog-dev libvulkan-dev
      - name: checkout code
        uses: actions/checkout@v4
      - name: Setup build folder
        run: |
          mkdir build
      - name: Load cache
        id: load-cache
        uses: actions/cache/restore@v5
        with:
          path: build
          key: canta-cache
      - name: Setup cmake
        run: |
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCANTA_ENABLE_RENDERDOC=OFF ..
      - name: Build
        run: |
          cd build
          cmake --build . --target Canta -j8
      - name: Store cache
        id: store-cache
        uses: actions/cache/save@v5
        with:
          path: build
          key: ${{ steps.load-cache.outputs.cache-primary-key }}